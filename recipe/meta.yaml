{% set name = "scriptrunner-gui" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scriptrunner_gui-{{ version }}.tar.gz
  sha256: 078b7c6fae0ae37efaa6342f78faf4b401bfd2facce14a25b63fcf6a937db33e

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  entry_points:
    - scriptrunner = scriptrunner.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - scriptrunner
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/algotom/scriptrunner
  license: Apache-2.0
  license_file: LICENSE
  summary: GUI software for rendering arguments of CLI Python scripts and scheduling runs

extra:
  recipe-maintainers:
    - nghia-vo
